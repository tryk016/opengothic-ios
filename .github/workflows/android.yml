name: Android build (signed .apk)

on:
  push:
    branches: [ android ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install glslang + spirv-tools (host shader compiler + optimizer)
        run: |
          sudo apt-get update && sudo apt-get install -y glslang-tools spirv-tools
          glslangValidator --version | head -2
          spirv-opt --version

      - name: Apply submodule patches
        run: bash android/patches/apply-patches.sh

      # TEMP [vvldiag]: bundle the Khronos validation layer so the device
      # settings (enable_gpu_debug_layers + gpu_debug_layers) can inject it
      # into this (debuggable) build. Revert with the build.gradle change.
      - name: Bundle Vulkan validation layer
        run: |
          curl -sL -o vvl.zip "https://github.com/KhronosGroup/Vulkan-ValidationLayers/releases/download/vulkan-sdk-1.4.350.1/android-binaries-1.4.350.1.zip"
          unzip -q vvl.zip
          for abi in arm64-v8a x86_64; do
            mkdir -p "android/app/src/main/jniLibs/$abi"
            cp "android-binaries-1.4.350.1/$abi/libVkLayer_khronos_validation.so" "android/app/src/main/jniLibs/$abi/"
          done
          ls -la android/app/src/main/jniLibs/arm64-v8a/

      - name: Build signed APK
        working-directory: android
        run: |
          chmod +x gradlew || true
          gradle wrapper --gradle-version 8.7 || true
          ./gradlew assembleRelease -PbuildNum=${{ github.run_number }}

      - name: Locate APK
        id: apk
        run: |
          APK="$(find android -name '*-release.apk' | head -n1)"
          if [ -z "$APK" ]; then echo "no apk produced"; exit 1; fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          cp "$APK" OpenGothic.apk

      - name: Publish to GitHub Release (latest-android)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="## ⚠️ WORK IN PROGRESS — NOT PLAYABLE YET — DO NOT INSTALL ⚠️

          This is an automated Android **test build** (\`1.0.${{ github.run_number }}\`, commit ${{ github.sha }}) of the OpenGothic port. It is **incomplete and not ready for players** — it is published only for development/CI purposes.

          A proper release with real install instructions will replace this notice once the Android port is ready. Please don't install these builds or file issues against them yet."
          TITLE="OpenGothic Android — WIP test build (do not install)"
          if gh release view latest-android >/dev/null 2>&1; then
            gh release edit latest-android --prerelease --title "$TITLE" --notes "$NOTES"
            gh release upload latest-android OpenGothic.apk --clobber
          else
            gh release create latest-android OpenGothic.apk \
              --title "$TITLE" --prerelease --notes "$NOTES"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenGothic-apk
          path: OpenGothic.apk
          if-no-files-found: error
