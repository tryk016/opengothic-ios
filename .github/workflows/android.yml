name: Android build (signed .apk)

on:
  push:
    branches: [ android ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install glslang (host shader compiler)
        run: sudo apt-get update && sudo apt-get install -y glslang-tools

      - name: Apply submodule patches
        run: bash android/patches/apply-patches.sh

      - name: Build signed APK
        working-directory: android
        run: |
          chmod +x gradlew || true
          gradle wrapper --gradle-version 8.7 || true
          ./gradlew assembleRelease -PbuildNum=${{ github.run_number }}

      - name: Locate APK
        id: apk
        run: |
          APK="$(find android -name '*-release.apk' | head -n1)"
          if [ -z "$APK" ]; then echo "no apk produced"; exit 1; fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          cp "$APK" OpenGothic.apk

      - name: Publish to GitHub Release (latest-android)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="Signed Android build \`1.0.${{ github.run_number }}\` (commit ${{ github.sha }}).
          Install: download OpenGothic.apk, enable 'Unknown sources', install.
          Put your legally-owned Gothic II data in /sdcard/OpenGothic/Gothic2/. No assets included."
          if gh release view latest-android >/dev/null 2>&1; then
            gh release edit latest-android --prerelease --notes "$NOTES"
            gh release upload latest-android OpenGothic.apk --clobber
          else
            gh release create latest-android OpenGothic.apk \
              --title "OpenGothic Android — latest" --prerelease --notes "$NOTES"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenGothic-apk
          path: OpenGothic.apk
          if-no-files-found: error
